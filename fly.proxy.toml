# Fly.io configuration for Proxy Gateway
app = "mcp-cloud-proxy"
primary_region = "nrt"

[build]
  dockerfile = "docker/Dockerfile.proxy"

[env]
  PROXY_HOST = "0.0.0.0"
  PROXY_PORT = "8081"
  RUST_LOG = "info"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
