# Fly.io configuration for API Server
app = "mcp-cloud-api"
primary_region = "nrt"

[build]
  dockerfile = "docker/Dockerfile.api"

[env]
  API_HOST = "0.0.0.0"
  API_PORT = "8080"
  RUST_LOG = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
